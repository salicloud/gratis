apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gratis.fullname" . }}-web
  labels:
    {{- include "gratis.labels" . | nindent 4 }}
    {{- include "gratis.web.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.web }}
  selector:
    matchLabels:
      {{- include "gratis.web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gratis.labels" . | nindent 8 }}
        {{- include "gratis.web.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.web.repository }}:{{ .Values.image.web.tag }}"
          imagePullPolicy: {{ .Values.image.web.pullPolicy }}
          env:
            - name: GRATIS_API_URL
              value: "http://{{ include "gratis.fullname" . }}-api:8080"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          resources:
            {{- toYaml .Values.resources.web | nindent 12 }}
