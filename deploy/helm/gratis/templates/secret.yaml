apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gratis.fullname" . }}
  labels:
    {{- include "gratis.labels" . | nindent 4 }}
type: Opaque
stringData:
  db-url: {{ .Values.secrets.dbURL | required "secrets.dbURL is required — pass via --set or a values file" }}
  admin-key: {{ .Values.secrets.adminKey | required "secrets.adminKey is required — pass via --set or a values file" }}
