apiVersion: v1
kind: Service
metadata:
  name: {{ include "gratis.fullname" . }}-web
  labels:
    {{- include "gratis.labels" . | nindent 4 }}
    {{- include "gratis.web.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "gratis.web.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
