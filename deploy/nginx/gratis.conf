# Gratis control plane nginx config
# Replace panel.sali.cloud with your actual domain before use.
#
# nginx routes:
#   /api/*   -> API (port 8080) directly, skipping the Next.js proxy hop
#   /*       -> Next.js frontend (port 3000)
#   :9090    -> gRPC — exposed directly by Docker, not proxied here

limit_req_zone $binary_remote_addr zone=gratis_admin:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name panel.sali.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name panel.sali.cloud;

    ssl_certificate     /etc/letsencrypt/live/panel.sali.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.sali.cloud/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # HSTS — only enable after you've confirmed SSL works
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options          DENY;
    add_header X-Content-Type-Options   nosniff;
    add_header Referrer-Policy          strict-origin-when-cross-origin;

    # Admin endpoints — rate limited, require explicit auth in the API layer
    location /api/v1/admin/ {
        limit_req zone=gratis_admin burst=5 nodelay;
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API — direct to port 8080, no Next.js hop
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 35s; # slightly above the 30s command timeout
    }

    # Frontend — Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        # WebSocket support for future real-time features
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    location /healthz {
        proxy_pass http://127.0.0.1:8080;
        access_log off;
    }
}
